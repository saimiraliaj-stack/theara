<body>
  <div class="page">
    <header class="header">
      <div class="container-wide navbar">
        <a class="brand" href="index.html">
          <img src="../assets/logo.svg" alt="THÈA RA MODE &amp; DESIGN">
        </a>
        <button class="menu-toggle" aria-label="Menu">Menu</button>
        <div class="nav-wrap">
          <nav class="nav-links"><a href="workwear.html" class="">Workwear</a><a href="websites.html" class="">Websites</a><a href="services.html" class="">Services</a><a href="work.html" class="">Work</a><a href="contact.html" class="active">Contact</a></nav>
          <div class="lang-switch"><a href="../kontakt.html">DE</a><a href="contact.html" class="current">EN</a></div>
        </div>
      </div>
    </header>
    
<main>
  <section class="page-hero">
    <div class="container contact-grid">
      <div class="reveal">
        <div class="eyebrow">Contact</div>
        <h1 class="page-title">Start a project.</h1>
      </div>
      <div class="contact-box reveal">
        <p><strong>Email</strong><br><a href="mailto:kontakt@thea-ra.de">kontakt@thea-ra.de</a></p>
        <p><strong>Phone</strong><br><a href="tel:+4917655981468">+49 176 55981468</a></p>
        <p><strong>Address</strong><br>Müllersgasse 4<br>47051 Duisburg<br>Germany</p>
      </div>
    </div>
  </section>

  <section class="section-tight border-top">
    <div class="container">
      <form class="reveal" action="mailto:kontakt@thea-ra.de" method="post" enctype="text/plain">
        <div class="form-grid">
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required>
          </div>
          <div class="field">
            <label for="company">Company</label>
            <input id="company" name="company" type="text">
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>
          </div>
          <div class="field">
            <label for="project">Project</label>
            <input id="project" name="project" type="text">
          </div>
          <div class="field full">
            <label for="details">Details</label>
            <textarea id="details" name="details"></textarea>
          </div>
          <div class="field full">
            <button class="button" type="submit">Start a project</button>
          </div>
        </div>
      </form>
    </div>
  </section>
</main>

    <footer class="footer">
      <div class="container footer-grid">
        <div>
          <div class="brand-mark">THÈA RA</div>
          <div class="brand-sub">Mode &amp; Design</div>
          <p class="small">Müllersgasse 4<br>47051 Duisburg<br>Germany</p>
        </div>
        <div class="footer-nav">
